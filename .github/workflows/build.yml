# Build Workflow — Build Docker images and push to ECR
#
# Triggers on merge to main. Tags images with git SHA + latest.
# Uses GitHub OIDC for keyless AWS authentication.

name: Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_short=$SHA_SHORT" >> $GITHUB_OUTPUT
          echo "api_image=${{ steps.login-ecr.outputs.registry }}/epl-predictor/api" >> $GITHUB_OUTPUT
          echo "training_image=${{ steps.login-ecr.outputs.registry }}/epl-predictor/training" >> $GITHUB_OUTPUT
          echo "mlflow_image=${{ steps.login-ecr.outputs.registry }}/epl-predictor/mlflow" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.api_image }}:${{ steps.tags.outputs.sha_short }}
            ${{ steps.tags.outputs.api_image }}:latest

      - name: Build and push Training image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/training.Dockerfile
          push: true
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}
          tags: |
            ${{ steps.tags.outputs.training_image }}:${{ steps.tags.outputs.sha_short }}
            ${{ steps.tags.outputs.training_image }}:latest

      - name: Build and push MLflow image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/mlflow.Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.mlflow_image }}:${{ steps.tags.outputs.sha_short }}
            ${{ steps.tags.outputs.mlflow_image }}:latest
