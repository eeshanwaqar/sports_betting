# Deploy Workflow — Deploy to ECS Fargate
#
# Triggers automatically after Build & Push succeeds on main (full CD pipeline).
# Can also be triggered manually with environment and image tag selection.
# Rolling deployment with health check verification and S3 frontend sync.

name: Deploy

on:
  workflow_run:
    workflows: ["Build & Push"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
          - staging
      image_tag:
        description: "Docker image tag to deploy (default: latest)"
        required: false
        default: "latest"
        type: string

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: epl-predictor-prod-cluster

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    # For workflow_run: only proceed if the build actually succeeded
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    # inputs.environment is null when triggered by workflow_run — default to 'prod'
    environment: ${{ inputs.environment || 'prod' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          # For workflow_run, check out the commit that was just built
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve deploy target
        id: target
        run: |
          ENV="${{ inputs.environment || 'prod' }}"
          TAG="${{ inputs.image_tag || 'latest' }}"
          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Deploying image tag '${TAG}' to environment '${ENV}'"

      - name: Get current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition epl-predictor-${{ steps.target.outputs.environment }}-api \
            --query 'taskDefinition' \
            --output json > task-definition.json

      - name: Update image in task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: api
          image: ${{ steps.login-ecr.outputs.registry }}/epl-predictor/api:${{ steps.target.outputs.image_tag }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: epl-predictor-${{ steps.target.outputs.environment }}-api
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 5

      - name: Verify deployment
        id: verify
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names epl-predictor-${{ steps.target.outputs.environment }}-alb \
            --query 'LoadBalancers[0].DNSName' --output text)
          echo "alb_dns=${ALB_DNS}" >> $GITHUB_OUTPUT
          echo "Checking health at http://$ALB_DNS/health"
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://$ALB_DNS/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Deploy frontend to S3
        if: steps.target.outputs.environment == 'prod'
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="epl-predictor-frontend-${ACCOUNT_ID}"
          API_URL="http://${{ steps.verify.outputs.alb_dns }}"

          # Inject the live API URL so the JS knows where to call
          echo "window.EPL_API_BASE = \"${API_URL}\";" > web/static/js/config.js

          # index.html → bucket root (never cached so users always get latest)
          aws s3 sync web/templates/ s3://${BUCKET}/ \
            --exclude "*" --include "index.html" --delete \
            --cache-control "no-cache, no-store, must-revalidate"

          # static assets → static/ prefix (long cache — safe, files change on every deploy)
          aws s3 sync web/static/ s3://${BUCKET}/static/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

          echo "Frontend live at: http://${BUCKET}.s3-website-us-east-1.amazonaws.com"
